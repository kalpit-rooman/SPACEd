<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACEd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="score">0</div>
            <div id="health-bar">
                <div id="health-fill"></div>
            </div>
            <div id="combo"></div>
            <div id="wave"></div>
            <div id="buffs"></div>
        </div>
        <div id="banner">
            <div id="banner-title"></div>
            <div id="banner-sub"></div>
        </div>
        <div id="loading-screen">
            <h1 class="loading-title">SPACEd</h1>
            <div id="loading-bar"><div id="loading-fill"></div></div>
            <p class="loading-text">LOADING</p>
        </div>
        <div id="start-screen">
            <h1>SPACEd</h1>
            <p class="subtitle">One key. Every action.</p>
            <div class="controls-info">
                <div class="control"><span class="key">TAP</span><span>Strike</span></div>
                <div class="control"><span class="key">HOLD</span><span>Parry</span></div>
                <div class="control"><span class="key">x2</span><span>Jump</span></div>
            </div>
            <div class="tells-info">
                <span><b style="color:#ff007f">PARRY</b> high attacks &amp; shots</span>
                <span><b style="color:#00f0ff">JUMP</b> low attacks</span>
            </div>
            <div id="best-line"></div>
            <div class="settings-row">
                <span class="settings-label">DIFFICULTY</span>
                <div id="difficulty-buttons">
                    <button class="diff-btn" data-diff="easy">EASY</button>
                    <button class="diff-btn" data-diff="normal">NORMAL</button>
                    <button class="diff-btn" data-diff="hard">HARD</button>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">VOLUME</span>
                <input id="vol-master" class="vol-slider" type="range" min="0" max="1" step="0.05">
            </div>
            <p class="start-prompt">Press SPACE to begin</p>
        </div>
        <div id="pause-screen" class="hidden">
            <h2>PAUSED</h2>
            <p class="start-prompt">Press ESC to resume</p>
        </div>
        <div id="game-over-screen" class="hidden">
            <h2>GAME OVER</h2>
            <p id="final-score"></p>
            <div id="record-badge" class="hidden">★ NEW BEST ★</div>
            <p id="best-final"></p>
            <p class="start-prompt">Press SPACE to restart</p>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
